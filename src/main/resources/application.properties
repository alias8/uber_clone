server.port=8080
# Postgres
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/twitter}
spring.datasource.username=${DATABASE_USER:jameskirk}
spring.datasource.password=${DATABASE_PASSWORD:password}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
# Cookie
cookie.secure=${COOKIE_SECURE:false}
# JWT
jwt.secret=${JWT_SECRET:change-me-to-a-long-random-secret-in-production}
jwt.expiration-ms=2592000000
# Kafka
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=feed-fanout-group                                                                                                                       
spring.kafka.consumer.auto-offset-reset=earliest
# Redis
spring.data.redis.host=localhost                                                                                                                       
spring.data.redis.port=6379